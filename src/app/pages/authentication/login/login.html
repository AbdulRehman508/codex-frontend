<div class="margin-logo">
    <img src="assets/logo/logo.png" alt="" width="200px">
</div>

<div class="login-box">
    <p class="{{forgot_password_visible ? 'f-20' : 'f-28'}} text-center primary-color mb-5">{{forgot_password_visible ? 'Forgot your Password?' : 'Sign In'}}</p>
    @if (!forgot_password_visible) {
    <form action="/" [formGroup]="loginForm">
        <div>
            <p class="mb-1">Email</p>
            <input type="email" formControlName="email" placeholder="Email"
                [ngClass]="{ _inputError: submitted && loginForm.controls['email'].invalid }">
        </div>
        <div class="mt-3 position-relative">
            <p class="mb-1">Password</p>
            <input [type]="password_visible ? 'password' : 'text'" formControlName="password"
                [ngClass]="{ _inputError: submitted && loginForm.controls['password'].invalid }">
            <i class="pi {{password_visible ? 'pi-eye-slash' : 'pi-eye'}} password-icon"
                (click)="password_visible=!password_visible"></i>
        </div>
        <div class="d-flex align-items-center justify-content-between mt-2">
            <div class="d-flex align-items-center gap-1">
                <input class="form-check-input" type="checkbox" formControlName="remember_me"
                    [ngClass]="{ _inputError: submitted && loginForm.controls['remember_me'].invalid }">
                <p>Remember me</p>
            </div>
            <a href="javascript:void(0)" class="f-12 primary-color text-decoration-none" (click)="forgot_password_visible = true">Forgot
                Password</a>
        </div>
        <div class="my-5 text-center">
            <button class="_primary-btn" type="button" [disabled]="loading()" (click)="submitForm()">{{ loading() ? 'Signing in...' : 'login' }}</button>
        </div>
        <p>Empowering your workflow, one login at a time</p>
    </form>
    } @else {
    <app-forgot-password (moveToLogin)="showLogin($event)"></app-forgot-password>
    }
</div>
