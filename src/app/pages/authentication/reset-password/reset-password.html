<div class="margin-logo">
    <img src="assets/logo/logo.png" alt="" width="200px">
</div>

<div class="login-box">
    <p class="f-20 text-center primary-color mb-5">Reset Password</p>

    @if (!token()) {
    <p class="text-center mb-4">This reset link is invalid or has expired.</p>
    <div class="text-center">
        <a class="f-12 primary-color text-decoration-none" [routerLink]="['/login']">
            <i class="pi pi-arrow-left f-10 mr-1"></i> Back to login
        </a>
    </div>
    } @else {
    <form action="/" [formGroup]="resetForm">
        <div class="position-relative">
            <p class="mb-1">New Password</p>
            <input [type]="password_visible ? 'password' : 'text'" formControlName="password"
                [ngClass]="{ _inputError: submitted && resetForm.controls['password'].invalid }"
                (input)="passwordCriteria()">
            <i class="pi {{password_visible ? 'pi-eye-slash' : 'pi-eye'}} password-icon"
                (click)="password_visible=!password_visible"></i>
            <div class="strength-bar" [ngClass]="strengthLevel.toLowerCase()"></div>
            @if(validation_error.length > 0){
            <ul class="invalid-list">
                @for (error of validation_error; track $index) {
                <li>{{ error }}</li>
                }
            </ul>
            }
        </div>
        <div class="mt-5 form-group text-right d-flex align-items-center justify-content-between">
            <a class="f-12 primary-color text-decoration-none" [routerLink]="['/login']">
                <i class="pi pi-arrow-left f-10 mr-1"></i> Back to login
            </a>
            <button class="_primary-btn" type="button" [disabled]="loading()" (click)="submit()">{{ loading() ? 'Saving...' : 'Continue' }}</button>
        </div>
    </form>
    }
</div>
