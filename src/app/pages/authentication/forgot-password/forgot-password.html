<form action="/" [formGroup]="forgotForm">
    @if(is_reset_password_email) {
        <div>
            <p class="mb-1">Email</p>
            <input type="email" formControlName="email" placeholder="Email"
                [ngClass]="{ _inputError: submitted && forgotForm.controls['email'].invalid }">
        </div>
    } @else {
        <div class="mt-3 position-relative">
            <p class="mb-1">Password</p>
            <input [type]="password_visible ? 'password' : 'text'" formControlName="password"
                [ngClass]="{ _inputError: submitted && forgotForm.controls['password'].invalid }"
                (input)="passwordCriteria()">
            <i class="pi {{password_visible ? 'pi-eye-slash' : 'pi-eye'}} password-icon"
                (click)="password_visible=!password_visible"></i>
            @if(validation_error.length > 0){
            <div class="strength-bar" [ngClass]="strengthLevel.toLowerCase()"></div>
            <ul class="invalid-list">
                @for (error of validation_error; track $index) {
                <li>{{ error }}</li>
                }
            </ul>
            }
        </div>
    }
    <div class="mt-5 form-group text-right d-flex align-items-center justify-content-between">
        <ng-container *ngTemplateOutlet="backToLogin"></ng-container>
        <button class="_primary-btn" type="submit" (click)="resetPassword()">Continue</button>
    </div>
</form>
<ng-template #backToLogin>
    <a href="javascript:void(0)" class="f-12 primary-color text-decoration-none" (click)="moveLogin()">
        <i class="pi pi-arrow-left f-10 mr-1"></i> Back to login
    </a>
</ng-template>
