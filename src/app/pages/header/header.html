<div class="siteTopBar" #topBar>
    <img src="{{ImageIcon.logo}}" alt="">
    <div class="d-flex align-items-center gap-2">
        <div class="w-200px">
            <ng-select [items]="officeList" bindLabel="office" bindValue="id"
                placeholder="Select Office">
            </ng-select>
        </div>
        <div class="login-user">
            <p>Welcome, Abdul Rehman</p>
            <p class="edge">AR</p>
            <i class="pi pi-angle-down cursor-pointer" (click)="this.dropdownOpen = !this.dropdownOpen"></i>
            <ul class="dropdown-menu" [class.show]="dropdownOpen">
                <li><a href="#">Profile</a></li>
                <li><a href="#">Logout</a></li>
            </ul>
        </div>
    </div>
</div>
