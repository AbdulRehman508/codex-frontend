<div class="top-box">
    <button class="_outline-btn" (click)="clearSearch()">Reset</button>
    <div class="position-relative">
        <input type="text" [(ngModel)]="searchByKeyword" (input)="filterRecord()" name="task-search"
            class="_input-icon w-100 custom-placeholder" placeholder="Search" />
        <i class="pi pi-search _search-icon"></i>
        @if (searchByKeyword) {
        <i class="pi pi-times _cross-icon pt-1" (click)="searchByKeyword = ''; getCustomerList()"></i>
        }
    </div>
    <div class="_circle-btn">
        <img [src]="commonIcon.delete_icon" class="cursor-pointer" width="18px" />
    </div>
    <button class="_outline-btn" [routerLink]="['/user-management/customer/add']">Add New</button>
</div>


<div class="position-relative">
    <div class="scroll_landing_page">
        <table class="table">
            <thead>
                <tr>
                    <th>
                        <input class="form-check-input" type="checkbox" [(ngModel)]="isTableHeaderChecked"
                            (change)="checkAll()">
                    </th>
                    <th scope="col">Full Name</th>
                    <th scope="col">Status</th>
                    <th scope="col">Mobile No</th>
                    <th scope="col">Email</th>
                    <th scope="col">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6">
                        <p>Record no available</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <!-- <p class="mt-5">Records: {{customerList.length}}</p> -->
</div>
